<!-- Legacy Menu Screen Ported to Modular HTML -->
<div class="menu-container">
  <img src="assets/logo.png" class="game-logo" alt="DREAMSCAPE MAZE" />
  <p class="tagline">Escape the darkness...</p>

  <div class="menu-buttons">
    <button id="btn-play" class="btn btn-primary" data-action="play">
      <span class="btn-icon">▶</span>
      SOLO PLAY
    </button>
    <button
      id="btn-multiplayer"
      class="btn btn-primary"
      data-action="multiplayer"
    >
      <span class="btn-icon">◈</span>
      MULTIPLAYER
    </button>
    <button id="btn-settings" class="btn btn-secondary" data-action="settings">
      <span class="btn-icon">⚙</span>
      SETTINGS
    </button>
    <button id="btn-controls" class="btn btn-secondary" data-action="controls">
      <span class="btn-icon">?</span>
      CONTROLS
    </button>
  </div>

  <p class="headphone-hint">
    <span class="hint-icon">🎧</span> Headphones Recommended
  </p>
</div>
